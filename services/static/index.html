<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de uso de sillas/cama</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-top: 20px; }
        .house { position: relative; width: 960px; height: 720px; background-color: #34495e; border: 4px solid #7f8c8d; margin-top: 30px; border-radius: 10px; }
        
        /* Mesa y Sillas */
        .table { position: absolute; top: 150px; left: 150px; width: 200px; height: 100px; background-color: #bdc3c7; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #2c3e50 }
        .device { position: absolute; background-color: #bdc3c7; border: 3px solid #95a5a6; display: flex; justify-content: center; align-items: center; color: #2c3e50; font-weight: bold; transition: all 0.3s ease; }
        
        /* Posiciones de las sillas alrededor de la mesa */
        #silla_1 { top: 90px; left: 230px; width: 40px; height: 40px; border-radius: 50%; }
        #silla_2 { top: 180px; left: 360px; width: 40px; height: 40px; border-radius: 50%; }
        #silla_3 { top: 260px; left: 230px; width: 40px; height: 40px; border-radius: 50%; }
        #silla_4 { top: 180px; left: 95px; width: 40px; height: 40px; border-radius: 50%; }
        
        /* Cama */
        #cama { top: 560px; right: 40px; width: 220px; height: 120px; border-radius: 10px; }

        /* Clases de activación */
        .active-chair { background-color: #e74c3c !important; border-color: #c0392b !important; box-shadow: 0 0 20px #e74c3c; color: white !important;}
        .active-bed-sleep { background-color: #3498db !important; border-color: #2980b9 !important; box-shadow: 0 0 20px #3498db; color: white !important;}
        .active-bed-sit { background-color: #f1c40f !important; border-color: #f39c12 !important; box-shadow: 0 0 20px #f1c40f; color: black !important;}
    </style>
</head>
<body>

    <h1>Monitoreo de uso de Sillas/Cama</h1>

    <div class="house">
        <div class="table">MESA</div>
        <div id="silla_1" class="device">1</div>
        <div id="silla_2" class="device">2</div>
        <div id="silla_3" class="device">3</div>
        <div id="silla_4" class="device">4</div>
        <div id="cama" class="device">CAMA</div>
    </div>

    <script>
        // Conectar al WebSocket
        const wsUrl = `ws://${window.location.host}/ws/ui`;
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => console.log("Conectado al servidor de Interfaz");

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const action = data.action;
            console.log("Acción recibida de CST:", action);

            // Lógica para interpretar Java
            
            // Sillas
            if (action.startsWith("luz_activa_")) {
                const chairId = action.replace("luz_activa_S", "");
                document.getElementById(chairId).classList.add("active-chair");
            } 
            else if (action.startsWith("luz_apaga_")) {
                const chairId = action.replace("luz_apaga_S", "");
                document.getElementById(chairId).classList.remove("active-chair");
            }
            
            // Cama
            else if (action === "modo_nocturno_on") {
                const cama = document.getElementById("cama");
                cama.className = "device active-bed-sleep"; // Luz azul (durmiendo)
            } 
            else if (action === "luz_cortesia_on") {
                const cama = document.getElementById("cama");
                cama.className = "device active-bed-sit"; // Luz amarilla (sentado)
            }
            else if (action === "luz_cama_off") {
                document.getElementById("cama").className = "device"; 
            }
        };
    </script>
</body>
</html>
